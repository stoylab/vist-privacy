<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vist — Email Confirmed</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #666; font-size: 15px; }
  </style>
</head>
<body>
  <div>
    <div class="icon">✓</div>
    <h1>Opening Vist...</h1>
    <p>If the app doesn't open, download it below.</p>
    <br>
    <a href="https://testflight.apple.com/join/N9GxmPaE" style="color:#FF6B35;">Download for iOS</a>
  </div>

  <script>
    window.onload = function() {
      window.location.href = 'vist://confirmed';
      setTimeout(function() {
        var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        var isAndroid = /Android/.test(navigator.userAgent);
        if (isIOS) {
          window.location.href = 'https://testflight.apple.com/join/N9GxmPaE';
        } else if (isAndroid) {
          window.location.href = 'https://play.google.com/store/apps/details?id=com.stoylab.vist';
        }
      }, 3000);
    };
  </script>
</body>
</html>
