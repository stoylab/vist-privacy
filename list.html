<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vist — Open Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #FF6B35;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
    }
    .label { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 15px; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #FF6B35;
      color: #fff;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #222;
      color: #fff;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    .btn-store:hover { opacity: 0.85; }
    .divider { color: #333; margin: 20px 0; font-size: 13px; }
  </style>
  <script>
    function getListId() {
      var path = window.location.pathname;
      var parts = path.split('/');
      return parts[parts.length - 1];
    }

    window.onload = function() {
      var listId = getListId();
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      var isAndroid = /Android/.test(navigator.userAgent);

      if (listId && listId !== 'list') {
        // Update the open button
        var openBtn = document.getElementById('open-btn');
        if (openBtn) {
          openBtn.href = 'vist://list/' + listId;
        }

        // Try to open app automatically
        var appUrl = 'vist://list/' + listId;
        window.location = appUrl;

        // Fallback to store after 2.5 seconds if app not installed
        setTimeout(function() {
          if (isIOS) {
            document.getElementById('ios-store').style.display = 'flex';
            document.getElementById('android-store').style.display = 'none';
          } else if (isAndroid) {
            document.getElementById('android-store').style.display = 'flex';
            document.getElementById('ios-store').style.display = 'none';
          } else {
            // Desktop — show both
            document.getElementById('ios-store').style.display = 'flex';
            document.getElementById('android-store').style.display = 'flex';
          }
          document.getElementById('store-section').style.display = 'block';
        }, 2500);
      }
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">✓</div>
    <p class="label">Shared Checklist</p>
    <h1>Open in Vist</h1>
    <p class="subtitle">Check it. Share it. Repeat it.</p>

    <a id="open-btn" href="vist://" class="btn">Open in Vist</a>

    <div id="store-section" style="display:none;">
      <p class="divider">— Don't have Vist? Download it free —</p>
      <a id="ios-store" href="https://testflight.apple.com/join/N9GxmPaE" class="btn-store">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download for iOS
      </a>
      <a id="android-store" href="https://play.google.com/store/apps/details?id=com.stoylab.vist" class="btn-store">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3.18 23.76c.3.17.64.19.96.07l13.2-7.62-2.82-2.82-11.34 10.37zM.5 1.05C.19 1.4 0 1.96 0 2.69v18.62c0 .73.19 1.29.51 1.64l.09.08 10.43-10.43v-.25L.59.97.5 1.05zM20.96 10.5l-2.83-1.63-3.17 3.17 3.17 3.17 2.84-1.64c.81-.47.81-1.23 0-1.67l-.01 0zM4.14.24L17.34 7.86l-2.82 2.82L3.18.31C3.5.19 3.84.21 4.14.24z"/></svg>
        Download for Android
      </a>
    </div>
  </div>
</body>
</html>
